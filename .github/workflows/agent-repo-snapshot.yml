name: Agent repository snapshot

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Create repository snapshot
        run: |
          python - <<'PY'
          import shutil
          shutil.make_archive('/tmp/gpt5.6-sol-action-rpg-demo', 'zip', '.')
          PY
      - name: Upload repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: gpt5.6-sol-action-rpg-demo-snapshot
          path: /tmp/gpt5.6-sol-action-rpg-demo.zip
          if-no-files-found: error
          retention-days: 1
      - name: Publish run id
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `SNAPSHOT_RUN_ID=${context.runId}`,
            });
